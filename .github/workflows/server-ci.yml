name: Test and publish server edition

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: server-edition-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SERVER_IMAGE: ghcr.io/vivata-pte-ltd/building-envelope-thermal-calculator

jobs:
  test-server:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8849806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Run all unit tests
        run: python -m unittest discover -s tests -v
      - name: Build the exact server image to test and publish
        run: |
          docker build \
            --build-arg APP_GIT_SHA="$GITHUB_SHA" \
            --build-arg APP_VERSION="4.4.0" \
            --build-arg APP_REPOSITORY="https://github.com/$GITHUB_REPOSITORY" \
            -t vivateq-envelope-server:test .
      - name: Start and verify container on a custom port
        shell: bash
        run: |
          trap 'docker rm -f envelope-test >/dev/null 2>&1 || true' EXIT
          docker run -d --name envelope-test -p 18091:8091 -e PORT=8091 -e UPDATE_ON_STARTUP=false vivateq-envelope-server:test
          ready=false
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:18091/api/health >/tmp/health.json; then ready=true; break; fi
            sleep 1
          done
          test "$ready" = true
          python - <<'PY'
          import json, os
          with open('/tmp/health.json', encoding='utf-8') as handle:
              health = json.load(handle)
          assert health['status'] == 'ok', health
          assert health['git_sha'] == os.environ['GITHUB_SHA'], health
          PY
          curl -fsS http://127.0.0.1:18091/ >/tmp/calculator.html
          grep -q "BCA Envelope Thermal" /tmp/calculator.html
          curl -fsS http://127.0.0.1:18091/standards.json >/tmp/standards.json
          python -m json.tool /tmp/standards.json >/dev/null
          healthy=false
          for _ in {1..70}; do
            if test "$(docker inspect -f '{{.State.Health.Status}}' envelope-test)" = healthy; then healthy=true; break; fi
            sleep 1
          done
          test "$healthy" = true
      - name: Install Cosign
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2
      - name: Publish full-commit and latest tags from the tested image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: "1"
        shell: bash
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          immutable="${SERVER_IMAGE}:server-${GITHUB_SHA}"
          latest="${SERVER_IMAGE}:server-latest"
          if docker buildx imagetools inspect "$immutable" >/dev/null 2>&1; then
            echo "Immutable full-commit tag already exists; refusing to overwrite it."
            existing_digest=$(docker buildx imagetools inspect "$immutable" --format '{{json .Manifest.Digest}}' | tr -d '"')
            cosign verify \
              --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/server-ci.yml@refs/heads/main" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${SERVER_IMAGE}@${existing_digest}" >/dev/null
            docker pull "$immutable"
            test "$(docker image inspect -f '{{range .Config.Env}}{{println .}}{{end}}' "$immutable" | sed -n 's/^APP_GIT_SHA=//p')" = "$GITHUB_SHA"
            docker buildx imagetools create --prefer-index=false --tag "$latest" "${SERVER_IMAGE}@${existing_digest}"
            test "$(docker buildx imagetools inspect "$latest" --format '{{json .Manifest.Digest}}' | tr -d '\"')" = "$existing_digest"
            echo "Published tested and signed image ${SERVER_IMAGE}@${existing_digest} for ${GITHUB_SHA}"
            exit 0
          fi
          docker tag vivateq-envelope-server:test "$immutable"
          docker push "$immutable"
          digest=$(docker buildx imagetools inspect "$immutable" --format '{{json .Manifest.Digest}}' | tr -d '"')
          test "${digest#sha256:}" != "$digest"
          cosign sign --yes "${SERVER_IMAGE}@${digest}"
          docker buildx imagetools create --prefer-index=false --tag "$latest" "${SERVER_IMAGE}@${digest}"
          test "$(docker buildx imagetools inspect "$latest" --format '{{json .Manifest.Digest}}' | tr -d '\"')" = "$digest"
          echo "Published tested and signed image ${SERVER_IMAGE}@${digest} for ${GITHUB_SHA}"