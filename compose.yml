services:
  envelope-calculator:
    build: .
    image: vivateq/building-envelope-thermal-calculator:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      UPDATE_INTERVAL_SECONDS: 21600
      UPDATE_ON_STARTUP: "true"
      STANDARDS_PATH: /app/data/standards.json
      SNAPSHOT_PATH: /app/data/latest-source.pdf
      ADMIN_UPDATE_TOKEN: "${ADMIN_UPDATE_TOKEN:-}"
    volumes:
      - standards-data:/app/data

volumes:
  standards-data:
